<!--
  深度重构版 (2026-05-24)
  1. 弹窗拦截自动暂停，用户允许后可点击“重试当前”继续，符合原始交互需求。
  2. 暂停时按钮布局：重试当前 / 取消任务 / 跳过当前，功能完整且不增加界面元素。
  3. 非自动清理模式下跳过不必要的文本框更新，大幅提升大量链接时的性能。
  4. 完全使用 var + function，无箭头函数/模板字符串，代码零简写。
  5. 保留所有历史功能：5 套主题、延时设置、自动清理、精准进度、安全过滤、IndexedDB 等。
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>批量打开网页助手 · Pro</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📂%3C/text%3E%3C/svg%3E">
    <style>
        /* ========== 经典深色主题（默认保留） ========== */
        :root,
        body[data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-light: #273548;
            --border: #334155;
            --border-light: #475569;
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --primary-glow: rgba(129, 140, 248, 0.3);
            --text: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --success: #34d399;
            --danger: #f87171;
            --warning: #fbbf24;
            --radius-lg: 24px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --shadow-lg: 0 25px 50px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 40px var(--primary-glow);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --header-bg: linear-gradient(135deg, rgba(30, 41, 59, 0.95) 0%, rgba(39, 53, 72, 0.9) 100%);
            --footer-bg: rgba(15, 23, 42, 0.4);
            --textarea-bg: #0f172a;
            --textarea-focus-bg: #0c1525;
            --card-bg: #273548;
            --btn-secondary-bg: #273548;
            --btn-secondary-hover: #334155;
            --progress-bg: #0f172a;
            --status-bg: rgba(255, 255, 255, 0.04);
            --theme-name: '经典深色';
            --logo-gradient: linear-gradient(135deg, #818cf8, #6366f1);
            --body-bg: linear-gradient(135deg, #0f172a 0%, #1a1f35 30%, #0f172a 70%, #1e2538 100%);
            --body-pattern: radial-gradient(ellipse at 20% 50%, rgba(129, 140, 248, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(99, 102, 241, 0.03) 0%, transparent 50%);
        }

        /* 天空蓝主题 */
        body[data-theme="sky"] {
            --bg: #e8f4fd;
            --surface: #ffffff;
            --surface-light: #dceefb;
            --border: #c4ddf5;
            --border-light: #a3c9ed;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --primary-glow: rgba(59, 130, 246, 0.25);
            --text: #0c1e3a;
            --text-secondary: #1a3b5c;
            --text-muted: #4a6d8c;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --shadow-lg: 0 20px 40px rgba(59, 130, 246, 0.08);
            --shadow-glow: 0 0 30px rgba(59, 130, 246, 0.2);
            --header-bg: #ffffff;
            --footer-bg: #e8f4fd;
            --textarea-bg: #f8fbff;
            --textarea-focus-bg: #eff6ff;
            --card-bg: #f0f7ff;
            --btn-secondary-bg: #e0effb;
            --btn-secondary-hover: #cde4f7;
            --progress-bg: #c4ddf5;
            --status-bg: #f0f7ff;
            --theme-name: '天空蓝';
            --logo-gradient: linear-gradient(135deg, #3b82f6, #2563eb);
            --body-bg: linear-gradient(160deg, #e8f4fd 0%, #d4e8fa 25%, #e0f0fc 50%, #cce2f6 75%, #e8f4fd 100%);
            --body-pattern: radial-gradient(ellipse at 15% 40%, rgba(59, 130, 246, 0.1) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 70%, rgba(37, 99, 235, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(147, 197, 253, 0.06) 0%, transparent 70%);
        }

        /* 琥珀金主题 */
        body[data-theme="sunset"] {
            --bg: #fef7ed;
            --surface: #ffffff;
            --surface-light: #fef0dc;
            --border: #f5d5a8;
            --border-light: #edc080;
            --primary: #f59e0b;
            --primary-hover: #d97706;
            --primary-glow: rgba(245, 158, 11, 0.25);
            --text: #2d1a06;
            --text-secondary: #5c360f;
            --text-muted: #8c5e2a;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --shadow-lg: 0 20px 40px rgba(245, 158, 11, 0.06);
            --shadow-glow: 0 0 30px rgba(245, 158, 11, 0.18);
            --header-bg: #ffffff;
            --footer-bg: #fef7ed;
            --textarea-bg: #fffdf8;
            --textarea-focus-bg: #fff9f0;
            --card-bg: #fff8ee;
            --btn-secondary-bg: #fef0dc;
            --btn-secondary-hover: #fce4c0;
            --progress-bg: #f5d5a8;
            --status-bg: #fff8ee;
            --theme-name: '琥珀金';
            --logo-gradient: linear-gradient(135deg, #f59e0b, #d97706);
            --body-bg: linear-gradient(150deg, #fef7ed 0%, #fef0dc 30%, #fdf3e6 60%, #feebcc 100%);
            --body-pattern: radial-gradient(ellipse at 20% 30%, rgba(245, 158, 11, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 60%, rgba(217, 119, 6, 0.08) 0%, transparent 55%),
                radial-gradient(circle at 60% 80%, rgba(252, 211, 77, 0.1) 0%, transparent 60%);
        }

        /* 翡翠绿主题 */
        body[data-theme="mint"] {
            --bg: #eafbf4;
            --surface: #ffffff;
            --surface-light: #d6f5e8;
            --border: #b8e6d0;
            --border-light: #8fd4b4;
            --primary: #10b981;
            --primary-hover: #059669;
            --primary-glow: rgba(16, 185, 129, 0.25);
            --text: #052e1d;
            --text-secondary: #0d4a32;
            --text-muted: #3d7a5c;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --shadow-lg: 0 20px 40px rgba(16, 185, 129, 0.06);
            --shadow-glow: 0 0 30px rgba(16, 185, 129, 0.16);
            --header-bg: #ffffff;
            --footer-bg: #eafbf4;
            --textarea-bg: #f8fdfa;
            --textarea-focus-bg: #effaf5;
            --card-bg: #f2fbf6;
            --btn-secondary-bg: #d6f5e8;
            --btn-secondary-hover: #b8e6d0;
            --progress-bg: #b8e6d0;
            --status-bg: #f2fbf6;
            --theme-name: '翡翠绿';
            --logo-gradient: linear-gradient(135deg, #10b981, #059669);
            --body-bg: linear-gradient(155deg, #eafbf4 0%, #d6f5e8 28%, #e0f8ee 55%, #c8eed8 82%, #eafbf4 100%);
            --body-pattern: radial-gradient(ellipse at 25% 45%, rgba(16, 185, 129, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 75% 25%, rgba(5, 150, 105, 0.07) 0%, transparent 55%),
                radial-gradient(circle at 55% 70%, rgba(110, 231, 183, 0.09) 0%, transparent 60%);
        }

        /* 罗兰紫主题 */
        body[data-theme="lavender"] {
            --bg: #f5f0ff;
            --surface: #ffffff;
            --surface-light: #ede2fe;
            --border: #d8c8f0;
            --border-light: #c0a8e4;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --primary-glow: rgba(139, 92, 246, 0.25);
            --text: #1a0a3e;
            --text-secondary: #2d1560;
            --text-muted: #5c4a8a;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --shadow-lg: 0 20px 40px rgba(139, 92, 246, 0.06);
            --shadow-glow: 0 0 30px rgba(139, 92, 246, 0.18);
            --header-bg: #ffffff;
            --footer-bg: #f5f0ff;
            --textarea-bg: #fdfbff;
            --textarea-focus-bg: #f8f4ff;
            --card-bg: #f8f4ff;
            --btn-secondary-bg: #ede2fe;
            --btn-secondary-hover: #d8c8f0;
            --progress-bg: #d8c8f0;
            --status-bg: #f8f4ff;
            --theme-name: '罗兰紫';
            --logo-gradient: linear-gradient(135deg, #8b5cf6, #7c3aed);
            --body-bg: linear-gradient(145deg, #f5f0ff 0%, #ede2fe 32%, #f0e8ff 58%, #e0d4f8 100%);
            --body-pattern: radial-gradient(ellipse at 18% 38%, rgba(139, 92, 246, 0.1) 0%, transparent 55%),
                radial-gradient(ellipse at 82% 65%, rgba(124, 58, 237, 0.07) 0%, transparent 50%),
                radial-gradient(circle at 45% 55%, rgba(167, 139, 250, 0.08) 0%, transparent 65%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--body-bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            color: var(--text);
            transition: background 0.5s ease;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: var(--body-pattern);
            pointer-events: none;
            z-index: 0;
            transition: background 0.5s ease;
        }

        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1100px;
            height: 90vh;
            max-height: 900px;
            min-height: 600px;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
        }

        .app-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 24px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            justify-content: space-between;
            transition: background 0.4s, border-color 0.4s;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .app-logo {
            width: 44px;
            height: 44px;
            background: var(--logo-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 8px 18px var(--primary-glow);
            transition: all 0.4s;
            color: #fff;
        }
        .app-title {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
            line-height: 1.2;
        }
        .app-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .theme-switcher {
            display: flex;
            gap: 8px;
            background: var(--surface-light);
            padding: 5px;
            border-radius: 30px;
            border: 1px solid var(--border);
            backdrop-filter: blur(4px);
            transition: background 0.4s, border-color 0.4s;
        }
        .theme-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }
        .theme-dot:hover {
            transform: scale(1.15);
        }
        .theme-dot.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .input-section {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            padding: 24px 20px 24px 28px;
            gap: 12px;
            min-width: 0;
        }
        .input-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .url-textarea {
            flex: 1;
            width: 100%;
            background: var(--textarea-bg);
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13.5px;
            padding: 16px 18px;
            resize: none;
            outline: none;
            transition: all var(--transition);
            line-height: 1.7;
            user-select: text;
            -webkit-user-select: text;
        }
        .url-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
            background: var(--textarea-focus-bg);
        }
        .input-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .control-section {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            padding: 24px 28px 24px 20px;
            border-left: 1px solid var(--border);
            min-width: 300px;
            max-width: 420px;
            overflow-y: auto;
            transition: border-color 0.4s;
            -webkit-overflow-scrolling: touch;
        }
        .control-card {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 16px 18px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
            transition: background 0.4s, border-color 0.4s;
        }
        .card-title {
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .delay-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-secondary);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .toggle-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }
        .delay-input-group {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--textarea-bg);
            border-radius: 8px;
            padding: 4px;
            border: 1px solid var(--border);
        }
        .delay-input-group input {
            width: 65px;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 14px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
            font-weight: 600;
        }
        .delay-input-group span {
            color: var(--text-muted);
            padding-right: 6px;
            font-size: 13px;
        }

        .progress-display {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .progress-bar-bg {
            flex: 1;
            height: 6px;
            background: var(--progress-bg);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-hover));
            border-radius: 10px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .progress-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
            white-space: nowrap;
            min-width: 45px;
            text-align: right;
        }
        .status-message {
            font-size: 0.8rem;
            padding: 8px 12px;
            border-radius: 20px;
            text-align: center;
            font-weight: 500;
            background: var(--status-bg);
            color: var(--text-secondary);
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .status-message.success {
            color: var(--success);
            background: rgba(5, 150, 105, 0.08);
        }
        .status-message.error {
            color: var(--danger);
            background: rgba(220, 38, 38, 0.08);
        }
        .status-message.warning {
            color: var(--warning);
            background: rgba(217, 119, 6, 0.08);
        }

        .button-area {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: 0.01em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #fff;
            box-shadow: 0 6px 18px var(--primary-glow);
            grid-column: 1 / -1;
            padding: 14px;
            font-size: 14px;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px var(--primary-glow);
        }
        .btn-primary:disabled {
            background: #94a3b8;
            color: #e2e8f0;
            box-shadow: none;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover:not(:disabled) {
            background: var(--btn-secondary-hover);
            border-color: var(--border-light);
            color: var(--text);
        }
        .btn-secondary:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .btn-danger {
            background: rgba(220, 38, 38, 0.08);
            color: var(--danger);
            border: 1px solid rgba(220, 38, 38, 0.18);
        }
        .btn-danger:hover:not(:disabled) {
            background: rgba(220, 38, 38, 0.16);
            border-color: rgba(220, 38, 38, 0.35);
        }

        .app-footer {
            padding: 10px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            font-size: 0.72rem;
            color: var(--text-muted);
            background: var(--footer-bg);
            transition: background 0.4s, border-color 0.4s;
        }
        .footer-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        /* 移动端增强 */
        @media (max-width: 850px) {
            body {
                padding: 0.5rem;
            }
            .app-container {
                height: auto;
                max-height: none;
                min-height: auto;
                border-radius: var(--radius-md);
            }
            .app-body {
                flex-direction: column;
            }
            .control-section {
                border-left: none;
                border-top: 1px solid var(--border);
                max-width: none;
                padding: 20px 20px;
                min-width: 0;
            }
            .button-area {
                margin-top: 10px;
            }
            .url-textarea {
                min-height: 200px;
            }
            .app-header {
                padding: 12px 16px;
                gap: 8px;
            }
            .theme-switcher {
                gap: 5px;
                padding: 3px;
            }
            .theme-dot {
                width: 24px;
                height: 24px;
            }
        }

        /* 加载遮罩 */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.3s;
            opacity: 1;
            pointer-events: all;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body data-theme="dark">
    <div class="app-container" id="appContainer">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
        </div>
        <div class="app-header">
            <div class="header-left">
                <div class="app-logo">📂</div>
                <div>
                    <div class="app-title">批量打开网页助手</div>
                    <div class="app-subtitle">Professional Edition</div>
                </div>
            </div>
            <div class="theme-switcher" id="themeSwitcher">
                <div class="theme-dot active" data-theme="dark" style="background:#1e293b;" title="经典深色"></div>
                <div class="theme-dot" data-theme="sky" style="background:#3b82f6;" title="天空蓝"></div>
                <div class="theme-dot" data-theme="sunset" style="background:#f59e0b;" title="琥珀金"></div>
                <div class="theme-dot" data-theme="mint" style="background:#10b981;" title="翡翠绿"></div>
                <div class="theme-dot" data-theme="lavender" style="background:#8b5cf6;" title="罗兰紫"></div>
            </div>
        </div>
        <div class="app-body">
            <div class="input-section">
                <div class="input-label">📋 网址列表（每行一个）</div>
                <textarea class="url-textarea" id="urlInput"
            placeholder="https://www.google.com&#10;https://www.github.com&#10;https://www.stackoverflow.com"></textarea>
                <div class="input-hint">💡 支持自动补全 https:// 前缀，每行一个网址</div>
            </div>
            <div class="control-section">
                <div class="control-card">
                    <div class="card-title">⏱️ 延时设置</div>
                    <div class="delay-row">
                        <label class="toggle-label">
                            <input type="checkbox" id="delayToggle">
                            <span>启用间隔</span>
                        </label>
                        <div class="delay-input-group">
                            <input type="number" id="delaySeconds" min="1" max="3600" value="10" step="1">
                            <span>秒</span>
                        </div>
                    </div>
                </div>
                <div class="control-card">
                    <div class="card-title">🧹 自动清理</div>
                    <label class="toggle-label" style="justify-content: flex-start;">
                        <input type="checkbox" id="autoClearToggle">
                        <span>打开后自动移除链接</span>
                    </label>
                </div>
                <div class="control-card">
                    <div class="card-title">📊 任务进度</div>
                    <div class="progress-display">
                        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
                        <span class="progress-text" id="progressText">0/0</span>
                    </div>
                    <div class="status-message" id="statusMessage">就绪</div>
                </div>
                <div class="button-area">
                    <div class="button-grid">
                        <button class="btn btn-primary" id="openBtn">🚀 一键打开全部</button>
                        <button class="btn btn-secondary" id="pauseBtn" disabled>⏸️ 暂停</button>
                        <button class="btn btn-danger" id="cancelBtn" disabled>❌ 取消</button>
                        <button class="btn btn-secondary" id="clearBtn">🗑️ 清空列表</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="app-footer">
            <span><span class="footer-dot"></span> IndexedDB 存储已启用</span>
            <span id="themeName">经典深色</span>
        </div>
    </div>

    <script>
        (function() {
            // ---------- IndexedDB 封装 ----------
            var DB_NAME = 'BatchUrlOpenerDB';
            var DB_VERSION = 1;
            var STORE_SETTINGS = 'settings';
            var SETTINGS_KEY = 'appState';

            function openDB() {
                return new Promise(function(resolve, reject) {
                    var request = window.indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = function(event) {
                        var db = event.target.result;
                        if (!db.objectStoreNames.contains(STORE_SETTINGS)) {
                            db.createObjectStore(STORE_SETTINGS);
                        }
                    };
                    request.onsuccess = function(event) {
                        resolve(event.target.result);
                    };
                    request.onerror = function(event) {
                        reject(event.target.error);
                    };
                });
            }

            function saveStateToDB(stateObj) {
                return openDB().then(function(db) {
                    return new Promise(function(resolve, reject) {
                        var transaction = db.transaction(STORE_SETTINGS, 'readwrite');
                        var store = transaction.objectStore(STORE_SETTINGS);
                        var request = store.put(stateObj, SETTINGS_KEY);
                        request.onsuccess = function() {
                            resolve();
                        };
                        request.onerror = function(event) {
                            reject(event.target.error);
                        };
                        transaction.oncomplete = function() {
                            db.close();
                        };
                    });
                });
            }

            function loadStateFromDB() {
                return openDB().then(function(db) {
                    return new Promise(function(resolve, reject) {
                        var transaction = db.transaction(STORE_SETTINGS, 'readonly');
                        var store = transaction.objectStore(STORE_SETTINGS);
                        var request = store.get(SETTINGS_KEY);
                        request.onsuccess = function(event) {
                            resolve(event.target.result || null);
                        };
                        request.onerror = function(event) {
                            reject(event.target.error);
                        };
                        transaction.oncomplete = function() {
                            db.close();
                        };
                    });
                });
            }

            function requestPersistence() {
                if (navigator.storage && navigator.storage.persist) {
                    navigator.storage.persist().then(function(isPersisted) {
                        console.log(isPersisted ? '持久存储已激活' : '持久存储请求被拒绝');
                    }).catch(function(err) { console.error(err); });
                }
            }

            // ---------- 全局状态 ----------
            var openState = 'idle';                 // idle | opening | paused
            var currentIndex = 0;                   // 当前在 urlList 中的索引位置
            var urlList = [];                       // 待打开的 URL 数组
            var totalToOpen = 0;                    // 初始总任务数（用于进度计算）
            var completedCount = 0;                 // 已成功打开的 URL 数量
            var currentTimeout = null;              // 定时器句柄
            var enableDelay = false;                // 是否启用间隔
            var delaySeconds = 10;                  // 间隔秒数
            var autoClearEnabled = false;           // 自动清理开关

            // ---------- DOM 元素 ----------
            var urlInput = document.getElementById('urlInput');
            var delayToggle = document.getElementById('delayToggle');
            var delayInput = document.getElementById('delaySeconds');
            var autoClearToggle = document.getElementById('autoClearToggle');
            var statusMessage = document.getElementById('statusMessage');
            var progressFill = document.getElementById('progressFill');
            var progressText = document.getElementById('progressText');
            var openBtn = document.getElementById('openBtn');
            var pauseBtn = document.getElementById('pauseBtn');
            var cancelBtn = document.getElementById('cancelBtn');
            var clearBtn = document.getElementById('clearBtn');
            var loadingOverlay = document.getElementById('loadingOverlay');

            // ---------- 异步存储 ----------
            function saveState() {
                var state = {
                    urls: urlInput.value,
                    enableDelay: delayToggle.checked,
                    delaySeconds: parseInt(delayInput.value, 10) || 10,
                    autoClearEnabled: autoClearToggle.checked,
                    theme: document.body.getAttribute('data-theme') || 'dark'
                };
                saveStateToDB(state).catch(function(err) {
                    console.warn('IndexedDB 保存失败，回退 localStorage', err);
                    try {
                        localStorage.setItem('batchOpenerProV6', JSON.stringify(state));
                    } catch (e) {}
                });
            }

            function loadState() {
                return loadStateFromDB().then(function(savedState) {
                    if (savedState && savedState.urls !== undefined) return savedState;
                    return new Promise(function(resolve) {
                        var ls = localStorage.getItem('batchOpenerProV6');
                        resolve(ls ? JSON.parse(ls) : null);
                    });
                }).catch(function() {
                    var ls = localStorage.getItem('batchOpenerProV6');
                    return ls ? JSON.parse(ls) : null;
                });
            }

            function applyLoadedState(state) {
                if (state) {
                    urlInput.value = state.urls || '';
                    enableDelay = state.enableDelay || false;
                    delaySeconds = state.delaySeconds || 10;
                    autoClearEnabled = state.autoClearEnabled || false;
                    delayToggle.checked = enableDelay;
                    delayInput.value = delaySeconds;
                    autoClearToggle.checked = autoClearEnabled;
                    if (state.theme) applyTheme(state.theme, false);
                } else {
                    urlInput.value = 'https://www.google.com\nhttps://www.github.com\nhttps://www.stackoverflow.com';
                    delayToggle.checked = false;
                    delayInput.value = 10;
                    autoClearToggle.checked = false;
                }
            }

            var saveTimer;
            function debouncedSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveState, 500); }
            function immediateSave() { clearTimeout(saveTimer); saveState(); }

            // ---------- 主题切换 ----------
            function applyTheme(theme, save) {
                if (save === undefined) save = true;
                document.body.setAttribute('data-theme', theme);
                var dots = document.querySelectorAll('.theme-dot');
                dots.forEach(function(d) { d.classList.remove('active'); });
                var dot = document.querySelector('.theme-dot[data-theme="' + theme + '"]');
                if (dot) dot.classList.add('active');
                var name = getComputedStyle(document.body).getPropertyValue('--theme-name').trim().replace(/['"]/g, '');
                document.getElementById('themeName').textContent = name || theme;
                if (save) immediateSave();
            }
            document.getElementById('themeSwitcher').addEventListener('click', function(e) {
                var dot = e.target.closest('.theme-dot');
                if (!dot) return;
                applyTheme(dot.dataset.theme);
            });

            // ---------- URL 安全过滤 ----------
            function normalizeUrl(rawUrl) {
                var trimmed = rawUrl.trim();
                if (!trimmed) return null;
                var urlString = /^https?:\/\//i.test(trimmed) ? trimmed : 'https://' + trimmed;
                try {
                    var urlObj = new URL(urlString);
                    if (urlObj.protocol !== 'http:' && urlObj.protocol !== 'https:') return null;
                    return urlObj.href;
                } catch (e) { return null; }
            }

            // ---------- UI 更新 ----------
            function setStatus(msg, type) {
                statusMessage.textContent = msg;
                statusMessage.className = 'status-message ' + (type || '');
            }
            function updateProgress() {
                if (openState === 'idle') {
                    progressFill.style.width = '0%'; progressText.textContent = '0/0'; return;
                }
                var percent = totalToOpen > 0 ? (completedCount / totalToOpen) * 100 : 0;
                progressFill.style.width = percent + '%';
                progressText.textContent = completedCount + '/' + totalToOpen;
            }
            function updateButtons() {
                if (openState === 'opening') {
                    openBtn.disabled = true;
                    pauseBtn.disabled = false; pauseBtn.textContent = '⏸️ 暂停';
                    cancelBtn.disabled = false; cancelBtn.textContent = '❌ 取消'; cancelBtn.className = 'btn btn-danger';
                    clearBtn.disabled = true; clearBtn.textContent = '🗑️ 清空列表'; clearBtn.className = 'btn btn-secondary';
                } else if (openState === 'paused') {
                    openBtn.disabled = true;
                    pauseBtn.disabled = false; pauseBtn.textContent = '🔄 重试当前'; pauseBtn.className = 'btn btn-secondary';
                    cancelBtn.disabled = false; cancelBtn.textContent = '❌ 取消任务'; cancelBtn.className = 'btn btn-danger';
                    clearBtn.disabled = false; clearBtn.textContent = '⏭️ 跳过当前'; clearBtn.className = 'btn btn-danger';
                } else {
                    openBtn.disabled = false;
                    pauseBtn.disabled = true; pauseBtn.textContent = '⏸️ 暂停'; pauseBtn.className = 'btn btn-secondary';
                    cancelBtn.disabled = true; cancelBtn.textContent = '❌ 取消'; cancelBtn.className = 'btn btn-danger';
                    clearBtn.disabled = false; clearBtn.textContent = '🗑️ 清空列表'; clearBtn.className = 'btn btn-secondary';
                }
                updateProgress();
            }

            function clearTimers() {
                if (currentTimeout) { clearTimeout(currentTimeout); currentTimeout = null; }
            }

            function finishTask(cancelled) {
                clearTimers();
                var done = completedCount, total = totalToOpen;
                openState = 'idle';
                if (cancelled) {
                    urlInput.value = urlList.join('\n');
                    setStatus('⛔ 已取消 (已完成 ' + done + '/' + total + ')，剩余链接已保留', 'warning');
                } else {
                    urlList = []; urlInput.value = '';
                    setStatus('✅ 全部完成！共 ' + total + ' 个', 'success');
                }
                currentIndex = 0; totalToOpen = 0; completedCount = 0;
                urlList = cancelled ? urlList : [];
                updateButtons(); immediateSave();
            }

            // ---------- 打开网页（window.open + 单次 blur/focus，检测拦截） ----------
            function openUrl(url) {
                var newWindow = window.open(url, '_blank', 'noopener,noreferrer');
                if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
                    setStatus('⚠️ 弹窗被拦截！请点击浏览器地址栏的“允许弹窗”，然后点击“重试当前”', 'error');
                    return false;
                }
                // 尝试让新窗口失去焦点，当前窗口获得焦点（尽力而为）
                try { newWindow.blur(); } catch (e) {}
                window.focus();
                return true;
            }

            function openNext() {
                if (openState !== 'opening') return;
                if (completedCount >= totalToOpen) { finishTask(false); return; }
                if (currentIndex >= urlList.length) { finishTask(false); return; }

                var url = urlList[currentIndex];
                var success = openUrl(url);

                if (!success) {
                    // 弹窗被拦截，自动暂停，保留当前 URL
                    openState = 'paused';
                    clearTimers();
                    updateButtons();
                    return;
                }

                completedCount++;
                updateProgress();

                // 维护列表与索引
                if (autoClearEnabled) {
                    urlList.splice(currentIndex, 1);
                    // currentIndex 不变，下一项已前移
                } else {
                    currentIndex++;
                }

                // 仅在列表确实变化时更新文本框，提升大量链接性能
                if (autoClearEnabled) {
                    urlInput.value = urlList.join('\n');
                }
                immediateSave();

                if (completedCount >= totalToOpen) { finishTask(false); return; }

                var delay = enableDelay ? delaySeconds * 1000 : 500;
                setStatus('📌 正在打开 (' + (completedCount + 1) + '/' + totalToOpen + ')');

                currentTimeout = setTimeout(function() {
                    if (openState === 'opening') openNext();
                }, delay);
            }

            // ---------- 按钮事件 ----------
            openBtn.addEventListener('click', function() {
                if (openState !== 'idle') return setStatus('⚠️ 任务进行中，请先取消或等待完成', 'warning');
                var lines = urlInput.value.split(/\r?\n/);
                var validUrls = [];
                lines.forEach(function(line) {
                    var normalized = normalizeUrl(line);
                    if (normalized && /^https?:\/\/[^\s]+/.test(normalized)) validUrls.push(normalized);
                });
                if (!validUrls.length) return setStatus('❌ 没有有效的网址', 'error');
                if (validUrls.length > 5000 && !confirm('即将打开 ' + validUrls.length + ' 个网页，数量较多，确定继续吗？')) return setStatus('已取消');

                enableDelay = delayToggle.checked;
                delaySeconds = parseInt(delayInput.value, 10) || 10;
                autoClearEnabled = autoClearToggle.checked;
                immediateSave();

                urlList = validUrls;
                totalToOpen = validUrls.length;
                currentIndex = 0; completedCount = 0;
                openState = 'opening';
                updateButtons();
                setStatus('🚀 开始打开 ' + totalToOpen + ' 个网页');
                openNext();
            });

            pauseBtn.addEventListener('click', function() {
                if (openState === 'opening') {
                    openState = 'paused'; clearTimers(); updateButtons();
                    setStatus('⏸️ 已暂停 (' + completedCount + '/' + totalToOpen + ')', 'warning');
                } else if (openState === 'paused') {
                    // 重试当前 URL（不跳过）
                    openState = 'opening'; updateButtons();
                    setStatus('🔄 已重试当前链接，继续执行', '');
                    openNext();
                } else setStatus('⚠️ 当前没有可暂停的任务', 'warning');
            });

            cancelBtn.addEventListener('click', function() {
                if (openState === 'idle') return setStatus('⚠️ 没有正在进行的任务', 'warning');
                if (openState === 'paused') {
                    // 暂停状态下 cancel 按钮为“取消任务”
                    finishTask(true);
                } else {
                    // opening 状态正常取消
                    finishTask(true);
                }
            });

            clearBtn.addEventListener('click', function() {
                if (openState === 'idle') {
                    urlInput.value = ''; immediateSave(); setStatus('🧹 列表已清空', 'success');
                } else if (openState === 'paused') {
                    // 暂停状态下，清空按钮临时变为“跳过当前”
                    if (currentIndex < urlList.length) {
                        completedCount++;
                        if (autoClearEnabled) urlList.splice(currentIndex, 1);
                        else currentIndex++;
                        urlInput.value = urlList.join('\n');
                        updateProgress(); immediateSave();
                        if (completedCount >= totalToOpen) { finishTask(false); return; }
                        openState = 'opening'; updateButtons();
                        setStatus('⏭️ 已跳过当前链接，继续执行 (' + (completedCount + 1) + '/' + totalToOpen + ')');
                        var delay = enableDelay ? delaySeconds * 1000 : 500;
                        currentTimeout = setTimeout(function() { if (openState === 'opening') openNext(); }, delay);
                    } else finishTask(false);
                } else setStatus('❌ 请先取消或等待任务完成', 'error');
            });

            // 设置监听
            delayToggle.addEventListener('change', function() { enableDelay = delayToggle.checked; debouncedSave(); });
            delayInput.addEventListener('input', function() {
                var v = parseInt(delayInput.value, 10); if (isNaN(v) || v < 1) v = 1;
                delayInput.value = v; delaySeconds = v; debouncedSave();
            });
            autoClearToggle.addEventListener('change', function() { autoClearEnabled = autoClearToggle.checked; debouncedSave(); });
            urlInput.addEventListener('input', debouncedSave);
            window.addEventListener('beforeunload', immediateSave);
            window.addEventListener('visibilitychange', function() { if (document.hidden) immediateSave(); });

            // 初始化
            function initializeApp() {
                loadState().then(function(state) {
                    applyLoadedState(state);
                    updateButtons(); setStatus('就绪'); urlInput.focus();
                }).catch(function() {
                    urlInput.value = 'https://www.google.com\nhttps://www.github.com\nhttps://www.stackoverflow.com';
                    updateButtons(); setStatus('就绪 (新会话)');
                }).finally(function() { if (loadingOverlay) loadingOverlay.classList.add('hidden'); });
                requestPersistence();
            }
            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initializeApp);
            else initializeApp();
        })();
    </script>
</body>
</html>
